# carl-base distribution defaults.
# Model/provider is intentionally NOT pinned here — it's chosen at setup:
#   carl setup --portal          (Nous Portal OAuth, recommended)
#   carl model                   (pick Anthropic OAuth / any provider)
# On `carl profile update` this file is preserved if the user edited it.

# Airtable MCP server — Carl's system of record.
# Reads AIRTABLE_API_KEY from the profile .env (never hardcode it here).
mcp_servers:
  airtable:
    command: "npx"
    args: ["-y", "airtable-mcp-server"]

# Carl runs unattended for a crew that is not at a terminal — a job assignment
# at 6am must not sit behind an approval prompt nobody is there to answer.
# Hermes defaults are mode: manual / cron_mode: deny; both are overridden here.
#   mode "off"        — no interactive approval prompts (quoted: YAML 1.1 reads
#                       bare `off` as the boolean false)
#   cron_mode approve — scheduled jobs self-approve instead of being denied
# Hermes still enforces its hardline floor (e.g. rm -rf /, credential exfil),
# which no setting can bypass. Tighten either value if you want Carl to ask
# first; `approvals.deny` takes a glob list that overrides even this.
approvals:
  mode: "off"
  cron_mode: approve
